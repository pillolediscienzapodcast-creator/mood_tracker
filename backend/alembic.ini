# Alembic configuration.
#
# NOTE: la connection string NON è definita qui.
# Viene impostata a runtime in alembic/env.py importando DATABASE_URL
# (che a sua volta deriva da app/core/config.py -> .env).

[alembic]
# Percorso degli script di migrazione (relativo a questo file).
script_location = alembic

# Aggiunge la cartella corrente (backend/) a sys.path,
# così `import app...` funziona quando si lancia alembic da backend/.
prepend_sys_path = .

# Template per il nome dei file di migrazione (timestamp + slug leggibile).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sqlalchemy.url è volutamente assente: impostato da env.py.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
